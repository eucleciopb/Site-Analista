<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agenda do Dia | Admin</title>

<style>
  body{
    margin:0;
    background:#ffffff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;
    justify-content:center;
    padding:40px 20px;
    color:#000;
  }
  .card{
    width:100%;
    max-width:1100px;
    background:#fff;
    border-radius:28px;
    padding:30px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .header h2{ margin:0; font-size:20px; }
  small{ color:#666; display:block; margin-top:4px; }
  hr{ margin:22px 0; border:none; height:1px; background:#eee; }

  .kpis{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .kpi{
    background:#f7f7f7;
    border:1px solid #eee;
    padding:12px 18px;
    border-radius:18px;
    font-weight:800;
    font-size:13px;
  }

  .actions{ display:flex; gap:10px; flex-wrap:wrap; }
  .btn{
    padding:10px 16px;
    border-radius:12px;
    border:1px solid #ddd;
    background:#fff;
    cursor:pointer;
    font-weight:800;
    transition:.15s;
  }
  .btn:hover{ background:#000; color:#fff; border-color:#000; }

  .error{
    margin-top:10px;
    font-size:13px;
    font-weight:800;
    color:#b00000;
    display:none;
  }
  .hint{
    margin-top:6px;
    font-size:12px;
    color:#666;
    font-weight:700;
  }

  table{ width:100%; border-collapse:collapse; }
  th, td{
    padding:14px;
    border-bottom:1px solid #eee;
    text-align:left;
    font-size:14px;
  }
  th{
    font-size:12px;
    text-transform:uppercase;
    color:#777;
    letter-spacing:.06em;
  }
  .ok{ color:#0a8f3c; font-weight:900; }
  .pend{ color:#c00000; font-weight:900; }
  .empty{ color:#999; font-style:italic; }

  @media (max-width: 700px){
    .header{ flex-direction:column; align-items:stretch; }
    .actions{ justify-content:flex-start; }
  }
</style>
</head>

<body class="bg-tech">
<div class="bg-grid"></div>

<header class="topbar animate-fade">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-6 w-full">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-xl bg-gradient-to-br from-[#1e40af] to-[#3b82f6] flex items-center justify-center shadow-lg shadow-[#3b82f6]/20">
        <span class="text-lg font-black italic">ADM</span>
      </div>
      <div>
        <h2 class="text-xl font-black italic uppercase tracking-tight">Monitor de Operações</h2>
        <div id="todayLabel" class="text-[10px] font-bold uppercase tracking-widest text-[#3b82f6]/60 mt-0.5 italic">DATA: —</div>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="btnReload" class="btn-cyber !px-6 !py-2 !text-[10px] !bg-white/5 !border-white/10 hover:!bg-white/10">Atualizar</button>
      <button onclick="location.href='../html_menus/menuadm.html'" class="bg-white/5 hover:bg-white/10 text-white/70 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border border-white/5">Voltar</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-6">
  
  <section class="glass-card p-8 animate-fade [animation-delay:0.1s]">
    <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/5 flex-wrap gap-4">
      <div>
        <h3 class="text-lg font-black italic uppercase">Telemetria de Campo</h3>
        <p id="hint" class="text-[10px] text-white/30 uppercase tracking-widest mt-1 italic">Status de sincronização dos analistas</p>
      </div>
      <div class="error text-[10px] font-black uppercase text-red-500" id="errorBox"></div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
      <div class="glass-card bg-white/[0.03] p-5 border border-white/5 text-center">
        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 italic">Total Ativos</div>
        <div class="text-3xl font-black italic tracking-tighter text-white" id="kpiUsers">0</div>
        <div class="text-[9px] uppercase tracking-widest text-[#3b82f6] mt-1">Operadores no Sistema</div>
      </div>

      <div class="glass-card bg-white/[0.03] p-5 border border-white/5 text-center">
        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 italic">Sincronizados</div>
        <div class="text-3xl font-black italic tracking-tighter text-green-500" id="kpiOk">0</div>
        <div class="text-[9px] uppercase tracking-widest text-green-500/60 mt-1">Lançamentos Confirmados</div>
      </div>

      <div class="glass-card bg-white/[0.03] p-5 border border-white/5 text-center">
        <div class="text-[9px] font-black uppercase tracking-[0.2em] text-white/30 mb-2 italic">Pendências</div>
        <div class="text-3xl font-black italic tracking-tighter text-red-500" id="kpiPend">0</div>
        <div class="text-[9px] uppercase tracking-widest text-red-500/60 mt-1">Aguardando Lançamento</div>
      </div>
    </div>

    <div class="overflow-x-auto rounded-2xl border border-white/10 bg-black/20">
      <table class="w-full text-left border-collapse">
        <thead class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-white/40">
          <tr>
            <th class="p-5 border-b border-white/5">NOME DO ANALISTA</th>
            <th class="p-5 border-b border-white/5 w-[140px]">STATUS LOG</th>
            <th class="p-5 border-b border-white/5 w-[280px]">LOCALIZAÇÃO (CD)</th>
            <th class="p-5 border-b border-white/5 w-[260px]">ATRIBUIÇÃO ATUAL</th>
          </tr>
        </thead>
        <tbody id="tbody" class="text-xs font-medium text-white/80 italic">
          <tr><td colspan="4" class="p-20 text-center text-white/20 uppercase tracking-[0.2em] italic">Rastreando Operadores...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

  <!-- ✅ CAMINHO CERTO: sai de /html adm/ e vai para /js/ -->
  <script type="module" src="../js/agenda-dia-adm.js"></script>
</body>
</html>
