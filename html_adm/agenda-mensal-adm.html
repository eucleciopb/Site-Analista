<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agenda Mensal | Admin</title>
<link rel="stylesheet" href="../css/styles.css" />

<style>
.topbar{
  position:sticky; top:0; z-index:999;
  backdrop-filter: blur(10px);
  background: rgba(11,15,20,.82);
  border-bottom:1px solid rgba(255,255,255,.08);
  padding:12px 0;
}
.topbar-inner{
  display:flex; justify-content:space-between;
  align-items:flex-start; gap:14px; flex-wrap:wrap;
}
.topbar h2{ margin:0; font-size:18px; }

.filters{
  display:flex; gap:12px; flex-wrap:wrap;
  margin-top:15px;
}
.filters > div{ min-width:220px; flex:1; }
.field{
  width:100%; padding:10px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.05);
  color:#fff;
}

.table-wrap{
  overflow:auto;
  margin-top:20px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.10);
}
table{
  width:100%;
  border-collapse:collapse;
  min-width:1200px;
}
thead th{
  background:rgba(0,0,0,.4);
  padding:12px;
  font-size:12px;
  text-align:left;
  color:#bbb;
}
tbody td{
  padding:11px 12px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
tbody tr:hover{
  background:rgba(255,255,255,.05);
}

.pill{
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
}
.ok{
  background:rgba(34,197,94,.12);
  color:#22c55e;
}
.pend{
  background:rgba(250,204,21,.12);
  color:#facc15;
}

.btn-mini{
  padding:8px 12px;
  border-radius:12px;
  border:none;
  background:#d91b2e;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}
.btn-mini:hover{ filter:brightness(1.1); }

</style>
</head>

<body class="bg-tech">
<div class="bg-grid"></div>

<header class="topbar animate-fade">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-6 w-full">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-xl bg-gradient-to-br from-[#1e40af] to-[#3b82f6] flex items-center justify-center shadow-lg shadow-[#3b82f6]/20">
        <span class="text-lg font-black italic">ADM</span>
      </div>
      <div>
        <h2 class="text-xl font-black italic uppercase tracking-tight">Matriz Estratégica</h2>
        <div id="userInfo" class="text-[10px] font-bold uppercase tracking-widest text-[#3b82f6]/60 mt-0.5 italic">ADMIN: —</div>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="btnMenu" class="bg-white/5 hover:bg-white/10 text-white/70 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border border-white/5">Voltar</button>
      <button id="btnLogout" class="bg-white/5 hover:bg-white/10 text-white/70 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border border-white/5">Sair</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-6">
  
  <section class="glass-card p-8 animate-fade [animation-delay:0.1s]">
    <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/5 flex-wrap gap-4">
      <div>
        <h3 class="text-lg font-black italic uppercase">Consola de Planejamento</h3>
        <p class="text-[10px] text-white/30 uppercase tracking-widest mt-1 italic">Visão mensal consolidada de operações regionais</p>
      </div>
      <div class="flex gap-4">
        <div class="w-48">
          <label class="block text-[9px] font-black uppercase tracking-widest text-white/20 mb-1">Mês de Referência</label>
          <input id="monthPicker" type="month" class="input-cyber w-full text-xs" />
        </div>
        <div class="w-64">
          <label class="block text-[9px] font-black uppercase tracking-widest text-white/20 mb-1">Filtro de Busca</label>
          <input id="busca" type="text" class="input-cyber w-full text-xs" placeholder="Analista ou CD..." />
        </div>
      </div>
    </div>

    <div class="overflow-x-auto rounded-2xl border border-white/10 bg-black/20">
      <table class="w-full text-left border-collapse min-w-[1200px]">
        <thead class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-white/40">
          <tr>
            <th class="p-5 border-b border-white/5 w-[120px]">DATA</th>
            <th class="p-5 border-b border-white/5 w-[80px]">DIA</th>
            <th class="p-5 border-b border-white/5 w-[160px]">OPERADOR</th>
            <th class="p-5 border-b border-white/5 w-[260px]">UNIDADE (CD)</th>
            <th class="p-5 border-b border-white/5">PROTOCOLO / ATIVIDADE</th>
            <th class="p-5 border-b border-white/5 w-[200px]">OBSERVAÇÕES</th>
            <th class="p-5 border-b border-white/5 w-[140px]">SITUAÇÃO</th>
          </tr>
        </thead>
        <tbody id="tbody" class="text-xs font-medium text-white/80">
          <tr><td colspan="7" class="p-20 text-center text-white/20 uppercase tracking-[0.2em] italic">Rastreando Histórico Estratégico...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

<script type="module">
import { db } from "../js/firebase.js";
import { collection, getDocs, query, where } from "firebase/firestore";

const PATH_INDEX = "../index.html";
const PATH_MENUADM = "../html_menus/menuadm.html";

const user = localStorage.getItem("usuarioLogado");
if(!user) window.location.href = PATH_INDEX;
document.getElementById("userInfo").textContent = "Admin: " + user;

document.getElementById("btnMenu").onclick = () => window.location.href = PATH_MENUADM;
document.getElementById("btnLogout").onclick = () => {
  localStorage.clear();
  window.location.href = PATH_INDEX;
};

const monthPicker = document.getElementById("monthPicker");
const busca = document.getElementById("busca");
const tbody = document.getElementById("tbody");

function pad2(n){ return String(n).padStart(2,"0"); }
function toMonthKey(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function toBR(iso){
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}
function diaSemana(iso){
  const [y,m,d] = iso.split("-");
  const dt = new Date(y, m-1, d);
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()];
}

let CACHE = [];

async function load(){
  const yyyyMM = monthPicker.value;
  const q = query(collection(db, "agenda_dias"), where("yyyyMM","==",yyyyMM));
  const snap = await getDocs(q);

  CACHE = [];
  snap.forEach(doc=>{
    CACHE.push({id:doc.id, ...doc.data()});
  });

  render();
}

function isFilled(x){
  return x.cd || x.atividade || x.obs;
}

function render(){
  let rows = CACHE.slice();

  const txt = busca.value.toLowerCase();
  if(txt){
    rows = rows.filter(x =>
      (x.usuarioNome || "").toLowerCase().includes(txt) ||
      (x.cd || "").toLowerCase().includes(txt)
    );
  }

  /* ✅ ORDENAR MAIS ANTIGO PRIMEIRO */
  rows.sort((a,b)=>{
    const da = Date.parse(a.data);
    const db = Date.parse(b.data);
    if(da !== db) return da - db; // ASC
    return (a.usuarioNome || "").localeCompare(b.usuarioNome || "");
  });

  tbody.innerHTML = "";
  if(rows.length===0){
    tbody.innerHTML = `<tr><td colspan="7" class="p-20 text-center text-white/20 uppercase tracking-[0.2em] italic">Nenhum registro estratégico localizado</td></tr>`;
    return;
  }

  rows.forEach(x=>{
    const isOk = isFilled(x);
    const statusText = isOk ? "PREENCHIDO" : "PENDENTE";
    const statusClass = isOk 
      ? "px-2 py-1 rounded-lg bg-green-500/10 text-green-500 font-black uppercase text-[10px] tracking-widest border border-green-500/20 italic" 
      : "px-2 py-1 rounded-lg bg-yellow-500/10 text-yellow-500 font-black uppercase text-[10px] tracking-widest border border-yellow-500/20";

    const tr = document.createElement("tr");
    tr.className = "hover:bg-white/[0.02] transition-colors border-b border-white/5 group";
    tr.innerHTML = `
      <td class="p-5 font-mono text-[10px] text-white/40 italic">${toBR(x.data)}</td>
      <td class="p-5 text-white/30 uppercase tracking-tighter">${diaSemana(x.data)}</td>
      <td class="p-5 font-bold italic tracking-tight text-white/90">${x.usuarioNome || "-"}</td>
      <td class="p-5"><span class="px-2 py-1 rounded bg-white/5 text-white/70 font-black uppercase text-[10px] tracking-tighter">${x.cd || "-"}</span></td>
      <td class="p-5 text-white/80 font-medium italic">${x.atividade || "-"}</td>
      <td class="p-5 text-[10px] text-white/30 truncate max-w-[200px]">${x.obs || "-"}</td>
      <td class="p-5"><span class="${statusClass}">${statusText}</span></td>
    `;
    tbody.appendChild(tr);
  });
}

(async () => {
  monthPicker.value = toMonthKey(new Date());
  await load();
})();

monthPicker.addEventListener("change", load);
busca.addEventListener("input", render);

</script>

</body>
</html>
