<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro de Treinamentos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-tech">
<div class="bg-grid"></div>

<header class="topbar animate-fade">
  <div class="flex items-center justify-between max-w-7xl mx-auto px-6 w-full">
    <div class="flex items-center gap-4">
      <div class="h-12 w-12 rounded-xl bg-gradient-to-br from-[#1e40af] to-[#3b82f6] flex items-center justify-center shadow-lg shadow-[#3b82f6]/20">
        <span class="text-lg font-black italic">ADM</span>
      </div>
      <div>
        <h2 class="text-xl font-black italic uppercase tracking-tight text-white">Gestor de Matrizes</h2>
        <div id="userInfo" class="text-[10px] font-bold uppercase tracking-widest text-[#3b82f6]/60 mt-0.5 italic">USUÁRIO: —</div>
      </div>
    </div>

    <div class="flex gap-3">
      <button id="btnMenu" class="bg-white/5 hover:bg-white/10 text-white/70 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border border-white/5">Voltar</button>
      <button id="btnLogout" class="bg-white/5 hover:bg-white/10 text-white/70 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border border-white/5">Sair</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-6">
  
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    
    <!-- FORMULÁRIO DE CADASTRO -->
    <section class="lg:col-span-4 glass-card p-8 animate-fade [animation-delay:0.1s] self-start">
      <div class="mb-8">
        <h3 id="formTitle" class="text-lg font-black italic uppercase tracking-widest text-[#3b82f6]">Nova Matriz</h3>
        <p class="text-[10px] text-white/30 uppercase tracking-widest mt-1 italic font-bold">Configuração de protocolo de capacitação</p>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-[9px] font-black uppercase tracking-widest text-white/20 mb-2 italic">Identificação do Treinamento</label>
          <input id="nomeTreino" type="text" class="input-cyber w-full text-xs" maxlength="100" placeholder="EX: PROTOCOLO DE VENDAS..." />
        </div>

        <div>
          <label class="block text-[9px] font-black uppercase tracking-widest text-white/20 mb-2 italic">Acesso ao Material (URL)</label>
          <input id="linkTreino" type="url" class="input-cyber w-full text-xs" placeholder="https://..." />
        </div>

        <div>
          <label class="block text-[9px] font-black uppercase tracking-widest text-white/20 mb-2 italic">Sistema de Avaliação (Forms)</label>
          <input id="linkForms" type="url" class="input-cyber w-full text-xs" placeholder="https://forms.gle/..." />
        </div>

        <div class="pt-4 flex flex-col gap-3">
          <button id="btnSalvar" class="btn-cyber !h-12 text-sm !bg-[#3b82f6]">ADICIONAR PROTOCOLO</button>
          <button id="btnCancelar" class="bg-white/5 hover:bg-white/10 text-white/40 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/5 italic" style="display:none;">CANCELAR EDIÇÃO</button>
        </div>
      </div>

      <p id="msg" class="text-[10px] font-black uppercase tracking-widest text-white/40 italic mt-6 text-center h-4"></p>
    </section>

    <!-- LISTAGEM -->
    <section class="lg:col-span-8 glass-card p-8 animate-fade [animation-delay:0.2s]">
      <div class="flex items-center justify-between mb-8 pb-4 border-b border-white/5 flex-wrap gap-4">
        <div>
          <h3 class="text-lg font-black italic uppercase">Matrizes Cadastradas</h3>
          <p class="text-[10px] text-white/30 uppercase tracking-widest mt-1 italic font-bold">Repositório global de competências</p>
        </div>
        <div class="w-64">
          <input id="busca" type="text" class="input-cyber w-full text-xs" placeholder="LOCALIZAR MATRIZ..." />
        </div>
      </div>

      <div class="overflow-x-auto rounded-2xl border border-white/10 bg-black/20">
        <table class="w-full text-left border-collapse min-w-[700px]">
          <thead class="bg-white/5 text-[10px] font-black uppercase tracking-widest text-white/40">
            <tr>
              <th class="p-5 border-b border-white/5 w-[60px]">#</th>
              <th class="p-5 border-b border-white/5">PROTOCOLOS ATIVOS</th>
              <th class="p-5 border-b border-white/5 w-[100px]">MATERIAL</th>
              <th class="p-5 border-b border-white/5 w-[100px]">FORMS</th>
              <th class="p-5 border-b border-white/5 w-[140px]">AUTOR</th>
              <th class="p-5 border-b border-white/5 w-[160px] text-right px-8">AÇÕES</th>
            </tr>
          </thead>
          <tbody id="tbody" class="text-xs font-medium text-white/80 italic">
            <tr><td colspan="6" class="p-20 text-center text-white/20 uppercase tracking-[0.2em] italic">Varrendo Banco de Dados...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </div>

</main>

<script type="module">
  import { db } from "../js/firebase.js";
  import {
    collection,
    getDocs,
    doc,
    setDoc,
    deleteDoc,
    serverTimestamp
  } from "firebase/firestore";

  /* =========================
     PATHS (ajuste se precisar)
  ========================= */
  const PATH_INDEX = "../index.html";
  const PATH_MENU  = "../html_menus/menuadm.html"; // ✅ aqui é admin (se seu menu admin tiver outro nome, troque)

  /* =========================
     CONTROLE DE ACESSO (SEU PADRÃO)
  ========================= */
  const usuario = (localStorage.getItem("usuarioLogado") || "").trim();
  if (!usuario) window.location.href = PATH_INDEX;

  document.getElementById("userInfo").textContent = `Usuário: ${usuario}`;

  // 🔒 opcional: só você cadastra
  if (usuario.toLowerCase() !== "euclecio") {
    window.location.href = PATH_MENU;
  }

  document.getElementById("btnMenu").onclick = () => window.location.href = PATH_MENU;
  document.getElementById("btnLogout").onclick = () => {
    localStorage.removeItem("usuarioLogado");
    localStorage.removeItem("usuarioKey");
    localStorage.removeItem("user_session");
    window.location.href = PATH_INDEX;
  };

  /* =========================
     COLEÇÃO (GLOBAL)
  ========================= */
  const COL = "biblioteca_treinamentos";

  /* =========================
     UI
  ========================= */
  const formTitle = document.getElementById("formTitle");
  const nomeInput = document.getElementById("nomeTreino");
  const linkTreinoInput = document.getElementById("linkTreino");
  const linkFormsInput = document.getElementById("linkForms");
  const btnSalvar = document.getElementById("btnSalvar");
  const btnCancelar = document.getElementById("btnCancelar");
  const tbody = document.getElementById("tbody");
  const busca = document.getElementById("busca");
  const msg = document.getElementById("msg");

  let editId = null;
  let CACHE = [];

  function setMsg(text, type="info"){
    msg.textContent = text || "";
    msg.style.color = type === "success" ? "#22c55e" : (type === "error" ? "#ef4444" : "#d1d5db");
  }

  function normalize(s){
    return (s || "").replace(/\s+/g, " ").trim();
  }

  function isValidUrlOrEmpty(v){
    const x = normalize(v);
    if (!x) return true;
    try { new URL(x); return true; } catch { return false; }
  }

  function makeId(){
    if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
    return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  function resetForm(){
    editId = null;
    formTitle.textContent = "Novo Treinamento";
    btnSalvar.textContent = "Adicionar";
    btnCancelar.style.display = "none";
    nomeInput.value = "";
    linkTreinoInput.value = "";
    linkFormsInput.value = "";
    nomeInput.focus();
  }

  async function loadAll(){
    const snap = await getDocs(collection(db, COL));
    const arr = [];
    snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
    arr.sort((a,b)=> String(a.nome||"").localeCompare(String(b.nome||""),"pt-BR"));
    CACHE = arr;
    return arr;
  }

  function render(){
    const q = (busca.value || "").toLowerCase();
    const data = (CACHE || []);
    const filtered = q
      ? data.filter(x => String(x.nome||"").toLowerCase().includes(q))
      : data;

    tbody.innerHTML = "";

    if (filtered.length === 0){
      tbody.innerHTML = `<tr><td colspan="6" style="opacity:.8;">Nenhum treinamento cadastrado.</td></tr>`;
      return;
    }

    filtered.forEach((t, i) => {
      const tr = document.createElement("tr");
      tr.className = "hover:bg-white/[0.02] transition-colors border-b border-white/5 group";
      tr.innerHTML = `
        <td class="p-5 font-mono text-[10px] text-white/30">${i+1}</td>
        <td class="p-5 font-bold italic tracking-tight text-white/90 uppercase text-sm">${t.nome || "-"}</td>
        <td class="p-5">
          ${t.linkTreino ? `<a href="${t.linkTreino}" target="_blank" rel="noopener" class="bg-white/5 hover:bg-white/10 text-white/60 px-3 py-1 rounded text-[10px] font-black uppercase tracking-tighter border border-white/5 transition-all">Abrir</a>` : "<span class='opacity-20'>-</span>"}
        </td>
        <td class="p-5">
          ${t.linkForms ? `<a href="${t.linkForms}" target="_blank" rel="noopener" class="bg-[#3b82f6]/10 hover:bg-[#3b82f6] hover:text-white text-[#3b82f6] px-3 py-1 rounded text-[10px] font-black uppercase tracking-tighter border border-[#3b82f6]/20 transition-all">Forms</a>` : "<span class='opacity-20'>-</span>"}
        </td>
        <td class="p-5 text-[10px] text-white/40 uppercase font-bold italic">${t.createdBy || "-"}</td>
        <td class="p-5 text-right px-8">
          <div class="flex justify-end gap-2">
            <button class="bg-white/5 hover:bg-white/10 text-white/60 px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest border border-white/5 transition-all" type="button" data-edit="${t.id}">Editar</button>
            <button class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest border border-red-500/20 transition-all" type="button" data-del="${t.id}">Excluir</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll("[data-edit]").forEach(btn => {
      btn.onclick = () => startEdit(btn.getAttribute("data-edit"));
    });

    tbody.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => removeItem(btn.getAttribute("data-del"));
    });
  }

  function startEdit(id){
    const item = (CACHE || []).find(x => x.id === id);
    if (!item) return;

    editId = id;
    formTitle.textContent = "Editar Treinamento";
    btnSalvar.textContent = "Salvar edição";
    btnCancelar.style.display = "inline-flex";

    nomeInput.value = item.nome || "";
    linkTreinoInput.value = item.linkTreino || "";
    linkFormsInput.value = item.linkForms || "";

    setMsg("Editando: ajuste os campos e clique em “Salvar edição”.", "info");
    nomeInput.focus();
  }

  async function removeItem(id){
    if (!id) return;
    try{
      setMsg("Excluindo…");
      await deleteDoc(doc(db, COL, id));
      CACHE = (CACHE || []).filter(x => x.id !== id);
      render();
      if (editId === id) resetForm();
      setMsg("Removido ✅", "success");
    }catch(e){
      console.error(e);
      setMsg("Erro ao excluir no Firebase. Verifique Rules.", "error");
    }
  }

  btnSalvar.onclick = async () => {
    setMsg("");

    const nome = normalize(nomeInput.value);
    const linkTreino = normalize(linkTreinoInput.value);
    const linkForms = normalize(linkFormsInput.value);

    if (!nome){
      setMsg("Digite o nome do treinamento.", "error");
      return;
    }
    if (!isValidUrlOrEmpty(linkTreino)){
      setMsg("Link do Treinamento inválido.", "error");
      return;
    }
    if (!isValidUrlOrEmpty(linkForms)){
      setMsg("Link do Forms inválido.", "error");
      return;
    }

    // valida duplicado por nome (exceto quando estiver editando o próprio)
    const duplicated = (CACHE || []).some(x =>
      String(x.nome || "").toLowerCase() === nome.toLowerCase() && x.id !== editId
    );
    if (duplicated){
      setMsg("Já existe um treinamento com esse nome.", "error");
      return;
    }

    const id = editId || makeId();

    try{
      setMsg(editId ? "Salvando edição…" : "Adicionando…");

      await setDoc(doc(db, COL, id), {
        nome,
        linkTreino: linkTreino || null,
        linkForms: linkForms || null,

        createdBy: editId ? ( (CACHE.find(x=>x.id===id)?.createdBy) || usuario ) : usuario,
        createdAt: editId ? ( (CACHE.find(x=>x.id===id)?.createdAt) || serverTimestamp() ) : serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      setMsg(editId ? "Edição salva ✅" : "Treinamento adicionado ✅", "success");
      resetForm();

      await loadAll();
      render();

    }catch(e){
      console.error(e);
      setMsg("Erro ao salvar no Firebase. Verifique Rules/Conexão.", "error");
    }
  };

  btnCancelar.onclick = () => {
    resetForm();
    setMsg("");
  };

  nomeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); btnSalvar.click(); }
  });

  busca.addEventListener("input", render);

  // init
  resetForm();
  try{
    setMsg("Carregando…");
    await loadAll();
    setMsg("");
    render();
  }catch(e){
    console.error(e);
    setMsg("Erro ao carregar do Firebase. Verifique Rules/Conexão.", "error");
    tbody.innerHTML = `<tr><td colspan="6" style="opacity:.8;">Falha ao carregar.</td></tr>`;
  }
</script>

</body>
</html>
