<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biblioteca de Treinamentos</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="bg-tech">
<div class="bg-grid"></div>

<header class="topbar animate-fade sticky top-0 z-50 backdrop-blur-md bg-black/40 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
    <div class="flex items-center gap-5">
      <div class="h-10 w-10 md:h-12 md:w-12 rounded-xl bg-gradient-to-br from-[#d91b2e] to-[#ff3b3b] flex items-center justify-center shadow-lg shadow-[#ff3b3b]/20 transition-transform hover:scale-110">
        <span class="text-base md:text-lg font-black italic">GP</span>
      </div>
      <div>
        <h2 class="text-lg md:text-xl font-black italic uppercase tracking-tight text-white">Central de Documentação</h2>
        <div id="userInfo" class="hidden md:block text-[9px] font-bold uppercase tracking-[0.2em] text-[#ff3b3b] mt-0.5 italic">USUÁRIO: —</div>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <button id="btnMenu" class="h-10 px-6 rounded-xl bg-white/5 hover:bg-white/10 text-white/60 hover:text-white text-[10px] font-black uppercase tracking-widest transition-all border border-white/5 italic">Voltar</button>
      <button id="btnLogout" class="h-10 px-6 rounded-xl bg-white/5 hover:bg-white/10 text-white/40 hover:text-white text-[10px] font-black uppercase tracking-widest transition-all border border-white/5">Sair</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-4 md:p-8 space-y-6 md:space-y-10">
  
  <section class="glass-card p-6 md:p-10 animate-fade [animation-delay:0.1s] relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-64 h-64 bg-[#ff3b3b] opacity-[0.05] blur-[100px] pointer-events-none"></div>
    
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 pb-6 border-b border-white/5 gap-8">
      <div>
        <h3 class="text-xl font-black italic uppercase text-white tracking-tight italic">Protocolos Disponíveis</h3>
        <p class="text-[10px] md:text-xs text-white/30 uppercase tracking-[0.2em] mt-1 font-bold italic">Sincronização global com matrizes de inteligência</p>
      </div>
      <div class="w-full md:w-80 group">
        <label for="busca" class="block text-[8px] font-black uppercase tracking-[0.4em] text-white/20 mb-2 italic ml-1">Filtro de busca</label>
        <input id="busca" type="text" class="input-cyber w-full text-xs h-12 !px-5" placeholder="LOCALIZAR MATERIAL..." />
      </div>
    </div>

    <div class="mb-6">
      <p id="msg" class="msg text-[9px] font-black uppercase tracking-[0.3em] italic"></p>
    </div>

    <div class="overflow-x-auto rounded-3xl border border-white/10 bg-black/40">
      <table class="w-full text-left border-collapse min-w-[900px]">
        <thead class="bg-white/5 text-[9px] font-black uppercase tracking-[0.2em] text-white/30">
          <tr>
            <th class="p-6 border-b border-white/5 w-[100px]">Nº</th>
            <th class="p-6 border-b border-white/5">ESPECIFICAÇÃO DO TREINAMENTO</th>
            <th class="p-6 border-b border-white/5 w-[180px]">DOCUMENTAÇÃO</th>
            <th class="p-6 border-b border-white/5 w-[160px]">FORMULÁRIOS</th>
            <th class="p-6 border-b border-white/5 w-[200px]">RESPONSÁVEL</th>
          </tr>
        </thead>
        <tbody id="tbody" class="text-xs font-bold text-white/70 italic">
          <tr><td colspan="5" class="p-24 text-center text-white/10 uppercase tracking-[0.4em] font-black">Iniciando Varredura no Repositório de Protocolos...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

</main>

  <script type="module">
    import { db } from "../js/firebase.js";
    import {
      collection,
      getDocs
    } from "firebase/firestore";

    const COL = "biblioteca_treinamentos";

    const PATH_INDEX = "../index.html";
    const PATH_MENU  = "../html_menus/menu.html"; // menu do usuário normal (ajuste se precisar)

    function safeParse(raw){ try { return JSON.parse(raw); } catch { return null; } }
    function getCurrentUserName(){
      const raw = localStorage.getItem("user_session");
      if(raw){
        const s = safeParse(raw);
        if(s?.nome) return String(s.nome).trim();
      }
      return (localStorage.getItem("usuarioLogado") || "").trim();
    }
    const usuario = getCurrentUserName();
    if (!usuario) window.location.href = PATH_INDEX;

    document.getElementById("userInfo").textContent = `Usuário: ${usuario}`;
    document.getElementById("btnMenu").onclick = () => window.location.href = PATH_MENU;
    document.getElementById("btnLogout").onclick = () => {
      localStorage.removeItem("user_session");
      localStorage.removeItem("usuarioLogado");
      window.location.href = PATH_INDEX;
    };

    const tbody = document.getElementById("tbody");
    const busca = document.getElementById("busca");
    const msg = document.getElementById("msg");

    function setMsg(text, type="info"){
      msg.textContent = text || "";
      msg.style.color = type === "success" ? "#22c55e" : (type === "error" ? "#ef4444" : "#d1d5db");
    }

    let CACHE = [];

    async function loadAll(){
      const snap = await getDocs(collection(db, COL));
      const arr = [];
      snap.forEach(d => arr.push({ id: d.id, ...d.data() }));
      arr.sort((a,b)=> String(a.nome||"").localeCompare(String(b.nome||""),"pt-BR"));
      CACHE = arr;
      return arr;
    }

    function render(){
      const q = (busca.value || "").toLowerCase();
      const data = (CACHE || []);
      const filtered = q ? data.filter(x => String(x.nome||"").toLowerCase().includes(q)) : data;

      tbody.innerHTML = "";
      if (filtered.length === 0){
        tbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-white/20 uppercase tracking-[0.2em] italic">Nenhum protocolo encontrado no Database</td></tr>`;
        return;
      }

      filtered.forEach((t, i) => {
        const tr = document.createElement("tr");
        tr.className = "hover:bg-white/[0.02] transition-colors border-b border-white/5 group";
        tr.innerHTML = `
          <td class="p-5 font-mono text-[10px] text-white/40 italic">#${(i+1).toString().padStart(3, '0')}</td>
          <td class="p-5 font-bold text-white/90 italic tracking-tight text-sm">${t.nome || "-"}</td>
          <td class="p-5">
            ${t.linkTreino ? `<a href="${t.linkTreino}" target="_blank" rel="noopener" class="inline-flex py-1 px-3 rounded-lg bg-[#ff3b3b]/10 text-[#ff3b3b] font-black uppercase text-[10px] tracking-widest border border-[#ff3b3b]/20 hover:bg-[#ff3b3b] hover:text-white transition-all decoration-transparent">Protocolo</a>` : `<span class="text-white/20 italic">Offline</span>`}
          </td>
          <td class="p-5">
            ${t.linkForms ? `<a href="${t.linkForms}" target="_blank" rel="noopener" class="inline-flex py-1 px-3 rounded-lg bg-white/5 text-white/70 font-black uppercase text-[10px] tracking-widest border border-white/10 hover:bg-white/10 hover:text-white transition-all decoration-transparent">Forms</a>` : `<span class="text-white/20 italic">N/A</span>`}
          </td>
          <td class="p-5 text-white/40 italic uppercase tracking-tighter text-[10px]">${t.createdBy || "-"}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    setMsg("Carregando…");
    try{
      await loadAll();
      setMsg("");
      render();
    }catch(e){
      console.error(e);
      setMsg("Erro ao carregar do Firebase. Verifique Rules/Conexão.", "error");
      tbody.innerHTML = `<tr><td colspan="5" style="opacity:.8;">Falha ao carregar.</td></tr>`;
    }

    busca.addEventListener("input", render);
  </script>
</body>
</html>
